<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ABH&amp;Co. — Arch Gate Mark</title>
  <desc>ABH&amp;Co. | &#x639;&#x628;&#x62F;&#x627;&#x644;&#x644;&#x647; &#x628;&#x646; &#x62D;&#x627;&#x631;&#x628; &#x648;&#x645;&#x634;&#x627;&#x631;&#x643;&#x648;&#x647; — Arch gate monogram mark</desc>

  <!-- ARCH GATE: fill-rule evenodd creates the hollow arch passage -->
  <!-- Outer gate body: arch crown + two pillars -->
  <!-- Inner path: subtracts the arch opening (passage) -->
  <path fill-rule="evenodd"
        d="M 0,50 A 50,50 0 0 1 100,50 L 100,120 L 0,120 Z
           M 20,50 A 30,30 0 0 1 80,50 L 80,120 L 20,120 Z"
        fill="#0A0907"/>

  <!-- Gold keystone diamond at arch apex (inside the arch crown wall) -->
  <polygon points="50,5 55,10 50,15 45,10" fill="#C9A84C"/>

  <!-- Gold inner arch hairline: architectural reveal detail -->
  <path d="M 23,50 A 27,27 0 0 1 77,50"
        fill="none" stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Gold crossbar: the threshold inside the arch passage -->
  <rect x="20" y="83" width="60" height="2" fill="#C9A84C"/>

  <!-- Gold base rule -->
  <rect x="0" y="117" width="100" height="3" fill="#C9A84C"/>
</svg>
