<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 370 90" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ABH&amp;Co. — English Wordmark</title>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap');
    ]]></style>
  </defs>

  <!-- Arch Gate Mark scaled to 75×90 -->
  <g transform="scale(0.75)">
    <path fill-rule="evenodd"
          d="M 0,50 A 50,50 0 0 1 100,50 L 100,120 L 0,120 Z
             M 20,50 A 30,30 0 0 1 80,50 L 80,120 L 20,120 Z"
          fill="#0A0907"/>
    <polygon points="50,5 55,10 50,15 45,10" fill="#C9A84C"/>
    <path d="M 23,50 A 27,27 0 0 1 77,50"
          fill="none" stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round"/>
    <rect x="20" y="83" width="60" height="2" fill="#C9A84C"/>
    <rect x="0" y="117" width="100" height="3" fill="#C9A84C"/>
  </g>

  <!-- Thin gold separator rule -->
  <rect x="86" y="14" width="0.75" height="62" fill="#C9A84C" opacity="0.55"/>

  <!-- Primary wordmark: ABH&Co. -->
  <text x="99" y="37"
        font-family="'Cormorant Garamond', Garamond, 'Times New Roman', Georgia, serif"
        fill="#0A0907">
    <tspan font-size="38" font-weight="600" letter-spacing="0.1em">ABH</tspan><tspan font-size="30" font-weight="300" font-style="italic" letter-spacing="0.02em">&amp;Co.</tspan>
  </text>

  <!-- Gold thin rule under main name -->
  <rect x="99" y="52" width="265" height="0.7" fill="#C9A84C" opacity="0.5"/>

  <!-- Full English name in small caps -->
  <text x="99" y="63"
        font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="7" font-weight="400" fill="#3D3728" letter-spacing="0.28em">
    ABDALLAH BIN HAREB AND COMPANY
  </text>

  <!-- Practice descriptor in gold -->
  <text x="99" y="76"
        font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="6.5" font-weight="300" fill="#C9A84C" letter-spacing="0.22em">
    LAWYERS &amp; COUNSELORS AT LAW
  </text>
</svg>
