<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ABH&amp;Co. — OpenGraph Preview</title>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Naskh+Arabic:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap');
    ]]></style>
    <pattern id="latticeOG" x="0" y="0" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M 35,0 L 70,35 L 35,70 L 0,35 Z M 35,6 L 64,35 L 35,64 L 6,35 Z"
            fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="1"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0907"/>
      <stop offset="100%" stop-color="#1C1914"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Lattice texture -->
  <rect width="1200" height="630" fill="url(#latticeOG)" opacity="0.055"/>

  <!-- Large ghost arch watermark -->
  <g transform="translate(800, -60) scale(6)" opacity="0.03">
    <path fill-rule="evenodd"
          d="M 0,50 A 50,50 0 0 1 100,50 L 100,120 L 0,120 Z
             M 20,50 A 30,30 0 0 1 80,50 L 80,120 L 20,120 Z"
          fill="#F5EDD6"/>
  </g>

  <!-- Gold frame border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#C9A84C" stroke-width="3"/>
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.35"/>

  <!-- Left column: vertical gold accent line -->
  <rect x="100" y="60" width="1.5" height="510" fill="#C9A84C" opacity="0.3"/>

  <!-- Arch Gate Mark: centered-left, large -->
  <!-- Scale 2.5 → 250×300, center at x=450 (left half), y=165 -->
  <g transform="translate(325, 165) scale(2.5)">
    <path fill-rule="evenodd"
          d="M 0,50 A 50,50 0 0 1 100,50 L 100,120 L 0,120 Z
             M 20,50 A 30,30 0 0 1 80,50 L 80,120 L 20,120 Z"
          fill="#F5EDD6"/>
    <polygon points="50,5 55,10 50,15 45,10" fill="#C9A84C"/>
    <path d="M 23,50 A 27,27 0 0 1 77,50"
          fill="none" stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round"/>
    <rect x="20" y="83" width="60" height="2" fill="#C9A84C"/>
    <rect x="0" y="117" width="100" height="3" fill="#C9A84C"/>
  </g>
  <!-- Mark: x:325–575, y:165–465 -->

  <!-- Vertical center divider -->
  <rect x="630" y="60" width="1.5" height="510" fill="#C9A84C" opacity="0.4"/>

  <!-- Right column: firm name and info -->
  <!-- Gold accent top rule -->
  <rect x="660" y="130" width="460" height="1.5" fill="#C9A84C"/>

  <!-- Arabic primary name -->
  <text x="890" y="210"
        font-family="'Noto Naskh Arabic', 'Arabic Typesetting', serif"
        font-size="58" font-weight="700" fill="#F5EDD6"
        text-anchor="middle" direction="rtl">
    &#x639;&#x628;&#x62F;&#x627;&#x644;&#x644;&#x647; &#x628;&#x646; &#x62D;&#x627;&#x631;&#x628;
  </text>
  <text x="890" y="270"
        font-family="'Noto Naskh Arabic', 'Arabic Typesetting', serif"
        font-size="58" font-weight="700" fill="#F5EDD6"
        text-anchor="middle" direction="rtl">
    &#x648;&#x645;&#x634;&#x627;&#x631;&#x643;&#x648;&#x647;
  </text>

  <!-- Arabic descriptor -->
  <text x="890" y="314"
        font-family="'Noto Naskh Arabic', 'Arabic Typesetting', serif"
        font-size="22" font-weight="400" fill="#C9A84C"
        text-anchor="middle" direction="rtl">
    &#x645;&#x62D;&#x627;&#x645;&#x648;&#x646; &#x648;&#x645;&#x633;&#x62A;&#x634;&#x627;&#x631;&#x648;&#x646; &#x642;&#x627;&#x646;&#x648;&#x646;&#x64A;&#x648;&#x646;
  </text>

  <!-- Gold thin divider -->
  <rect x="660" y="335" width="460" height="0.8" fill="#C9A84C" opacity="0.5"/>

  <!-- English ABH&Co. -->
  <text x="890" y="388"
        font-family="'Cormorant Garamond', Georgia, serif"
        text-anchor="middle" fill="#C9A84C">
    <tspan font-size="52" font-weight="600" letter-spacing="0.1em">ABH</tspan><tspan font-size="42" font-weight="300" font-style="italic">&amp;Co.</tspan>
  </text>

  <!-- English full name -->
  <text x="890" y="420"
        font-family="'Montserrat', Arial, sans-serif"
        font-size="13" font-weight="400" fill="#F5EDD6" opacity="0.55"
        text-anchor="middle" letter-spacing="0.22em">
    ABDALLAH BIN HAREB AND COMPANY
  </text>

  <!-- Gold bottom rule -->
  <rect x="660" y="440" width="460" height="1.5" fill="#C9A84C"/>

  <!-- Contact details -->
  <text x="890" y="472"
        font-family="'Montserrat', Arial, sans-serif"
        font-size="14" font-weight="300" fill="#F5EDD6" opacity="0.5"
        text-anchor="middle" letter-spacing="0.1em">
    +971 55 600 0708 · Office No. 15, Ajman, UAE
  </text>
  <text x="890" y="496"
        font-family="'Montserrat', Arial, sans-serif"
        font-size="13" font-weight="300" fill="#C9A84C" opacity="0.6"
        text-anchor="middle" letter-spacing="0.08em">
    Almheiri.Counsel@outlook.com
  </text>
</svg>
