<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 420 90" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ABH&amp;Co. — Arabic Wordmark</title>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Montserrat:wght@300;400&display=swap');
    ]]></style>
  </defs>

  <!-- Arch Gate Mark scaled to 75×90 (left anchor) -->
  <g transform="scale(0.75)">
    <path fill-rule="evenodd"
          d="M 0,50 A 50,50 0 0 1 100,50 L 100,120 L 0,120 Z
             M 20,50 A 30,30 0 0 1 80,50 L 80,120 L 20,120 Z"
          fill="#0A0907"/>
    <polygon points="50,5 55,10 50,15 45,10" fill="#C9A84C"/>
    <path d="M 23,50 A 27,27 0 0 1 77,50"
          fill="none" stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round"/>
    <rect x="20" y="83" width="60" height="2" fill="#C9A84C"/>
    <rect x="0" y="117" width="100" height="3" fill="#C9A84C"/>
  </g>

  <!-- Thin gold separator -->
  <rect x="86" y="14" width="0.75" height="62" fill="#C9A84C" opacity="0.55"/>

  <!-- Primary Arabic wordmark: right-aligned -->
  <text x="410" y="37"
        font-family="'Noto Naskh Arabic', 'Arabic Typesetting', serif"
        font-size="28" font-weight="700" fill="#0A0907"
        text-anchor="end" direction="rtl">
    &#x639;&#x628;&#x62F;&#x627;&#x644;&#x644;&#x647; &#x628;&#x646; &#x62D;&#x627;&#x631;&#x628; &#x648;&#x645;&#x634;&#x627;&#x631;&#x643;&#x648;&#x647;
  </text>

  <!-- Gold thin rule -->
  <rect x="99" y="52" width="311" height="0.7" fill="#C9A84C" opacity="0.5"/>

  <!-- Arabic descriptor: right-aligned -->
  <text x="410" y="66"
        font-family="'Noto Naskh Arabic', 'Arabic Typesetting', serif"
        font-size="13" font-weight="400" fill="#3D3728"
        text-anchor="end" direction="rtl">
    &#x645;&#x62D;&#x627;&#x645;&#x648;&#x646; &#x648;&#x645;&#x633;&#x62A;&#x634;&#x627;&#x631;&#x648;&#x646; &#x642;&#x627;&#x646;&#x648;&#x646;&#x64A;&#x648;&#x646;
  </text>

  <!-- English descriptor: right-aligned, very small -->
  <text x="410" y="78"
        font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="6" font-weight="300" fill="#C9A84C"
        text-anchor="end" letter-spacing="0.22em">
    LAWYERS &amp; COUNSELORS AT LAW
  </text>
</svg>
