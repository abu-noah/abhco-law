<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ABH&amp;Co.</title>
  <!-- Favicon: simplified arch gate, optimised for 32×32 and 16×16 rendering -->
  <!-- Square viewBox, arch compressed to fit, thicker strokes for readability -->

  <!-- Ivory background for browser tab visibility -->
  <rect width="100" height="100" fill="#F5EDD6"/>

  <!-- Arch gate: wider walls for small-size clarity -->
  <path fill-rule="evenodd"
        d="M 5,48 A 45,45 0 0 1 95,48 L 95,96 L 5,96 Z
           M 21,48 A 29,29 0 0 1 79,48 L 79,96 L 21,96 Z"
        fill="#0A0907"/>

  <!-- Gold keystone: circle instead of diamond at small sizes -->
  <circle cx="50" cy="10" r="4.5" fill="#C9A84C"/>

  <!-- Gold crossbar -->
  <rect x="21" y="76" width="58" height="3" fill="#C9A84C"/>

  <!-- Gold base rule -->
  <rect x="5" y="93" width="90" height="4" fill="#C9A84C"/>
</svg>
