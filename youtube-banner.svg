<?xml version="1.0" encoding="UTF-8"?>
<!-- YouTube banner: 2560×1440 total. Safe area: 1546×423 centered at (507,508)–(2053,931) -->
<svg viewBox="0 0 2560 1440" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ABH&amp;Co. — YouTube Banner</title>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Naskh+Arabic:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap');
    ]]></style>
    <pattern id="latticeYT" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 50,0 L 100,50 L 50,100 L 0,50 Z M 50,8 L 92,50 L 50,92 L 8,50 Z"
            fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="1"/>
    </pattern>
    <linearGradient id="bgYT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0907"/>
      <stop offset="100%" stop-color="#1A1612"/>
    </linearGradient>
  </defs>

  <!-- Full background -->
  <rect width="2560" height="1440" fill="url(#bgYT)"/>
  <rect width="2560" height="1440" fill="url(#latticeYT)" opacity="0.04"/>

  <!-- YouTube safe area indicator (for design reference only — not visible on platform) -->
  <!-- Safe area: 1546×423, centered → x:507, y:508 (outside visible: TVs see all, mobile sees center) -->
  <!-- All critical content placed within safe zone: x:507–2053, y:508–931 -->

  <!-- Gold top and bottom frame rules (full width) -->
  <rect x="0" y="0" width="2560" height="4" fill="#C9A84C"/>
  <rect x="0" y="1436" width="2560" height="4" fill="#C9A84C"/>

  <!-- Large arch mark: centered in safe area, scale 4.5 → 450×540 -->
  <!-- x: 2560/2 - 225 = 1055, y: 720-270=450 -->
  <!-- But centered composition: arch left of center -->
  <!-- Center at x=1280: place arch at x=830, y=420 -->
  <g transform="translate(830, 420) scale(4.5)" opacity="0.92">
    <path fill-rule="evenodd"
          d="M 0,50 A 50,50 0 0 1 100,50 L 100,120 L 0,120 Z
             M 20,50 A 30,30 0 0 1 80,50 L 80,120 L 20,120 Z"
          fill="#F5EDD6"/>
    <polygon points="50,5 55,10 50,15 45,10" fill="#C9A84C"/>
    <path d="M 23,50 A 27,27 0 0 1 77,50"
          fill="none" stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round"/>
    <rect x="20" y="83" width="60" height="2" fill="#C9A84C"/>
    <rect x="0" y="117" width="100" height="3" fill="#C9A84C"/>
  </g>
  <!-- Mark: x:830–1280, y:420–960 -->

  <!-- Gold vertical divider -->
  <rect x="1320" y="400" width="2" height="640" fill="#C9A84C" opacity="0.4"/>

  <!-- Right column: firm name -->
  <!-- Gold top accent -->
  <rect x="1360" y="460" width="820" height="2" fill="#C9A84C"/>

  <!-- Arabic primary name -->
  <text x="1770" y="590"
        font-family="'Noto Naskh Arabic', 'Arabic Typesetting', serif"
        font-size="100" font-weight="700" fill="#F5EDD6"
        text-anchor="middle" direction="rtl">
    &#x639;&#x628;&#x62F;&#x627;&#x644;&#x644;&#x647; &#x628;&#x646; &#x62D;&#x627;&#x631;&#x628;
  </text>
  <text x="1770" y="700"
        font-family="'Noto Naskh Arabic', 'Arabic Typesetting', serif"
        font-size="100" font-weight="700" fill="#F5EDD6"
        text-anchor="middle" direction="rtl">
    &#x648;&#x645;&#x634;&#x627;&#x631;&#x643;&#x648;&#x647;
  </text>

  <!-- Arabic descriptor -->
  <text x="1770" y="760"
        font-family="'Noto Naskh Arabic', 'Arabic Typesetting', serif"
        font-size="38" font-weight="400" fill="#C9A84C"
        text-anchor="middle" direction="rtl">
    &#x645;&#x62D;&#x627;&#x645;&#x648;&#x646; &#x648;&#x645;&#x633;&#x62A;&#x634;&#x627;&#x631;&#x648;&#x646; &#x642;&#x627;&#x646;&#x648;&#x646;&#x64A;&#x648;&#x646;
  </text>

  <!-- Gold divider -->
  <rect x="1360" y="790" width="820" height="1.5" fill="#C9A84C" opacity="0.45"/>

  <!-- English ABH&Co. -->
  <text x="1770" y="878"
        font-family="'Cormorant Garamond', Georgia, serif"
        text-anchor="middle" fill="#C9A84C">
    <tspan font-size="90" font-weight="600" letter-spacing="0.1em">ABH</tspan><tspan font-size="72" font-weight="300" font-style="italic">&amp;Co.</tspan>
  </text>

  <!-- Full name -->
  <text x="1770" y="930"
        font-family="'Montserrat', Arial, sans-serif"
        font-size="22" font-weight="400" fill="#F5EDD6" opacity="0.5"
        text-anchor="middle" letter-spacing="0.22em">
    ABDALLAH BIN HAREB AND COMPANY
  </text>

  <!-- Gold bottom accent -->
  <rect x="1360" y="960" width="820" height="2" fill="#C9A84C"/>

  <!-- Contact (outside strict safe zone but visible on desktop/TV) -->
  <text x="1770" y="1020"
        font-family="'Montserrat', Arial, sans-serif"
        font-size="22" font-weight="300" fill="#F5EDD6" opacity="0.4"
        text-anchor="middle" letter-spacing="0.12em">
    +971 55 600 0708 · Office No. 15, Ajman, UAE
  </text>
</svg>
