<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ABH&amp;Co. — X/Twitter Banner</title>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Naskh+Arabic:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap');
    ]]></style>
    <pattern id="latticeX" x="0" y="0" width="65" height="65" patternUnits="userSpaceOnUse">
      <path d="M 32.5,0 L 65,32.5 L 32.5,65 L 0,32.5 Z M 32.5,5 L 60,32.5 L 32.5,60 L 5,32.5 Z"
            fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="1"/>
    </pattern>
  </defs>

  <rect width="1500" height="500" fill="#0A0907"/>
  <rect width="1500" height="500" fill="url(#latticeX)" opacity="0.045"/>

  <!-- Ghost arch watermark right -->
  <g transform="translate(1150, -80) scale(5.5)" opacity="0.035">
    <path fill-rule="evenodd"
          d="M 0,50 A 50,50 0 0 1 100,50 L 100,120 L 0,120 Z
             M 20,50 A 30,30 0 0 1 80,50 L 80,120 L 20,120 Z"
          fill="#F5EDD6"/>
  </g>

  <!-- Frame rules -->
  <rect x="0" y="0" width="1500" height="3" fill="#C9A84C"/>
  <rect x="0" y="497" width="1500" height="3" fill="#C9A84C"/>
  <rect x="30" y="22" width="1440" height="456" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.25"/>

  <!-- Arch mark: left, scaled for 420px height -->
  <!-- scale = 420/120 = 3.5, width = 350 -->
  <!-- Centered vertically: y = (500-420)/2 = 40 -->
  <g transform="translate(80, 40) scale(3.5)">
    <path fill-rule="evenodd"
          d="M 0,50 A 50,50 0 0 1 100,50 L 100,120 L 0,120 Z
             M 20,50 A 30,30 0 0 1 80,50 L 80,120 L 20,120 Z"
          fill="#F5EDD6"/>
    <polygon points="50,5 55,10 50,15 45,10" fill="#C9A84C"/>
    <path d="M 23,50 A 27,27 0 0 1 77,50"
          fill="none" stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round"/>
    <rect x="20" y="83" width="60" height="2" fill="#C9A84C"/>
    <rect x="0" y="117" width="100" height="3" fill="#C9A84C"/>
  </g>
  <!-- Mark: x:80–430, y:40–460 -->

  <!-- Gold vertical separator -->
  <rect x="466" y="50" width="1.5" height="400" fill="#C9A84C" opacity="0.45"/>

  <!-- Arabic name: centered right area -->
  <text x="980" y="195"
        font-family="'Noto Naskh Arabic', 'Arabic Typesetting', serif"
        font-size="72" font-weight="700" fill="#F5EDD6"
        text-anchor="middle" direction="rtl">
    &#x639;&#x628;&#x62F;&#x627;&#x644;&#x644;&#x647; &#x628;&#x646; &#x62D;&#x627;&#x631;&#x628; &#x648;&#x645;&#x634;&#x627;&#x631;&#x643;&#x648;&#x647;
  </text>

  <!-- Gold divider -->
  <rect x="490" y="225" width="960" height="1.2" fill="#C9A84C" opacity="0.45"/>

  <!-- English ABH&Co. -->
  <text x="980" y="308"
        font-family="'Cormorant Garamond', Georgia, serif"
        text-anchor="middle" fill="#C9A84C">
    <tspan font-size="70" font-weight="600" letter-spacing="0.12em">ABH</tspan><tspan font-size="56" font-weight="300" font-style="italic">&amp;Co.</tspan>
  </text>

  <!-- Full name -->
  <text x="980" y="360"
        font-family="'Montserrat', Arial, sans-serif"
        font-size="16" font-weight="400" fill="#F5EDD6" opacity="0.5"
        text-anchor="middle" letter-spacing="0.25em">
    ABDALLAH BIN HAREB AND COMPANY
  </text>

  <!-- Tagline -->
  <text x="980" y="400"
        font-family="'Montserrat', Arial, sans-serif"
        font-size="15" font-weight="300" fill="#C9A84C" opacity="0.65"
        text-anchor="middle" letter-spacing="0.18em">
    LAWYERS &amp; COUNSELORS AT LAW · AJMAN, UAE
  </text>
</svg>
