<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ABH&amp;Co. — Gold on Black Variant</title>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Montserrat:wght@300;400;500&display=swap');
    ]]></style>
  </defs>

  <!-- Black background -->
  <rect width="480" height="200" fill="#0A0907"/>

  <!-- Arch Gate Mark: ivory/cream on black, centered -->
  <g transform="translate(197.5, 4) scale(0.85)">
    <path fill-rule="evenodd"
          d="M 0,50 A 50,50 0 0 1 100,50 L 100,120 L 0,120 Z
             M 20,50 A 30,30 0 0 1 80,50 L 80,120 L 20,120 Z"
          fill="#F5EDD6"/>
    <polygon points="50,5 55,10 50,15 45,10" fill="#C9A84C"/>
    <path d="M 23,50 A 27,27 0 0 1 77,50"
          fill="none" stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round"/>
    <rect x="20" y="83" width="60" height="2" fill="#C9A84C"/>
    <rect x="0" y="117" width="100" height="3" fill="#C9A84C"/>
  </g>

  <!-- Gold primary divider -->
  <rect x="40" y="113" width="400" height="1" fill="#C9A84C"/>

  <!-- Arabic primary: ivory -->
  <text x="240" y="135"
        font-family="'Noto Naskh Arabic', 'Arabic Typesetting', serif"
        font-size="26" font-weight="700" fill="#F5EDD6"
        text-anchor="middle" direction="rtl">
    &#x639;&#x628;&#x62F;&#x627;&#x644;&#x644;&#x647; &#x628;&#x646; &#x62D;&#x627;&#x631;&#x628; &#x648;&#x645;&#x634;&#x627;&#x631;&#x643;&#x648;&#x647;
  </text>

  <!-- Arabic descriptor: gold -->
  <text x="240" y="152"
        font-family="'Noto Naskh Arabic', 'Arabic Typesetting', serif"
        font-size="12" font-weight="400" fill="#C9A84C"
        text-anchor="middle" direction="rtl">
    &#x645;&#x62D;&#x627;&#x645;&#x648;&#x646; &#x648;&#x645;&#x633;&#x62A;&#x634;&#x627;&#x631;&#x648;&#x646; &#x642;&#x627;&#x646;&#x648;&#x646;&#x64A;&#x648;&#x646;
  </text>

  <!-- Thin secondary divider -->
  <rect x="80" y="162" width="320" height="0.6" fill="#C9A84C" opacity="0.5"/>

  <!-- English ABH&Co.: gold -->
  <text x="240" y="180"
        font-family="'Cormorant Garamond', Garamond, 'Times New Roman', Georgia, serif"
        text-anchor="middle" fill="#C9A84C">
    <tspan font-size="22" font-weight="600" letter-spacing="0.12em">ABH</tspan><tspan font-size="18" font-weight="300" font-style="italic" letter-spacing="0.02em">&amp;Co.</tspan>
  </text>

  <!-- English full name: ivory subdued -->
  <text x="240" y="194"
        font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="6.5" font-weight="400" fill="#F5EDD6" opacity="0.65"
        text-anchor="middle" letter-spacing="0.28em">
    ABDALLAH BIN HAREB AND COMPANY
  </text>
</svg>
